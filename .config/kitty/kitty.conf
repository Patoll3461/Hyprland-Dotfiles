shell zsh

font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
font_size        11.0

background #1b1224
foreground #d9c7ff
cursor     #b5acc2
background_opacity 0.82

color0 #0c0810
color1 #ff4d6d
color2 #7dffb2
color3 #ffd36e
color4 #7aa2ff
color5 #ff4fd8
color6 #8be9ff
color7 #c9b6d9

color8  #2a1a33
color9  #ff6b85
color10 #9fffc7
color11 #ffe08a
color12 #9ab8ff
color13 #ff7ae6
color14 #a6f0ff
color15 #f2e9ff

selection_background #d8c6f5
selection_foreground #301954

scrollback_lines 10000
wheel_scroll_multiplier 3.0

confirm_os_window_close 0
enable_audio_bell no
visual_bell_duration 0.0

clipboard_control write-clipboard write-primary read-clipboard read-primary

repaint_delay 10
input_delay 3
sync_to_monitor yes

window_padding_width 10
